<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Meaning — Heart Coherence</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;overflow:hidden;
  font-family:'Cormorant Garamond',Georgia,serif;
  color:#0d0d0d;background:#fff;
  touch-action:manipulation;
}

/* SCREENS */
.screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity 0.9s cubic-bezier(0.4,0,0.2,1),transform 0.9s cubic-bezier(0.4,0,0.2,1);
}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(0.975)}

/* Stars */
.stars{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 8% 14%,rgba(0,0,0,.85),transparent),
    radial-gradient(1px 1px at 82% 12%,rgba(0,0,0,.55),transparent),
    radial-gradient(1px 1px at 42% 72%,rgba(0,0,0,.65),transparent),
    radial-gradient(1px 1px at 93% 78%,rgba(0,0,0,.7),transparent),
    radial-gradient(1px 1px at 22% 88%,rgba(0,0,0,.5),transparent),
    radial-gradient(1px 1px at 68% 4%,rgba(0,0,0,.45),transparent),
    radial-gradient(1px 1px at 14% 52%,rgba(0,0,0,.35),transparent),
    radial-gradient(1px 1px at 57% 38%,rgba(0,0,0,.25),transparent),
    radial-gradient(1px 1px at 35% 30%,rgba(0,0,0,.3),transparent),
    radial-gradient(1px 1px at 76% 55%,rgba(0,0,0,.4),transparent);
  animation:twinkle 8s ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:.35}50%{opacity:.9}}

.vignette{
  position:fixed;inset:0;pointer-events:none;z-index:2;
  background:radial-gradient(ellipse at center,transparent 38%,rgba(200,200,200,.18) 100%);
}

/* Back button */
.back-btn{
  position:fixed;top:20px;left:24px;
  background:transparent;border:none;
  color:#999;font-family:'JetBrains Mono',monospace;
  font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  cursor:pointer;z-index:300;transition:color .2s;padding:6px 0;
}
.back-btn:hover{color:#000}
.back-btn.hidden{display:none}

/* ============================================================
   SCREEN 1 — INTRO
   ============================================================ */
/* intro background now uses <img> tag — see .vitruvian-img */
/* Intro styling defined below in Vitruvian section */
header{
  position:fixed;top:0;left:0;right:0;
  padding:18px 24px;display:flex;
  justify-content:space-between;align-items:center;
  z-index:100;pointer-events:none;
}
.proj-title{
  font-family:'Cinzel',serif;font-size:13px;font-weight:500;
  letter-spacing:.28em;text-transform:uppercase;color:#000;
}
.hint-text{
  font-size:10px;color:#999;letter-spacing:.2em;
  text-transform:uppercase;font-family:'JetBrains Mono',monospace;
  animation:fadeHint 3s ease-in-out infinite;
}
@keyframes fadeHint{0%,100%{opacity:.4}50%{opacity:1}}

@keyframes glowText{
  0%,100%{filter:drop-shadow(0 0 8px rgba(0,0,0,.25))}
  50%{filter:drop-shadow(0 0 20px rgba(0,0,0,.55))}
}

footer{
  position:fixed;bottom:14px;left:0;right:0;text-align:center;
  font-family:'JetBrains Mono',monospace;font-size:9px;color:#bbb;
  letter-spacing:.2em;text-transform:uppercase;pointer-events:none;z-index:10;
}

/* ============================================================
   SCREEN 2 — INSTRUCTIONS
   ============================================================ */
/* Override the default .screen flex-centring so the instructions
   page scrolls vertically on all viewports. Without this, tall
   content on phones gets clipped at the top and bottom. */
#screen-instructions{
  background:#fff;
  display:block;                 /* cancel .screen flex centring */
  overflow-y:auto;               /* page itself scrolls */
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  touch-action:pan-x pan-y pinch-zoom; /* scroll + horizontal pan + pinch-zoom */
}

.instr-layout{
  display:grid;
  grid-template-columns:1fr 1.1fr;
  grid-template-areas:
    "header  header"
    "theory  theory"
    "body    text"
    "footer  footer";
  width:100%;
  max-width:1080px;margin:0 auto;
  padding:56px 40px 48px;
  column-gap:56px;
  row-gap:44px;
  align-items:center;
  min-height:100vh;
}
.instr-header-row{grid-area:header;text-align:center}
.instr-theory-row{grid-area:theory}
.instr-body-col{grid-area:body}
.instr-text-col{grid-area:text}
.instr-footer-row{grid-area:footer}

@media(max-width:720px){
  .instr-layout{
    grid-template-columns:1fr;
    grid-template-areas:
      "header"
      "theory"
      "body"
      "text"
      "footer";
    padding:56px 22px 64px;
    column-gap:0;
    row-gap:32px;
    align-items:start;
  }
  .instr-header-row{text-align:left}
}

/* Left col — body visualization */
.instr-body-col{
  display:flex;flex-direction:column;align-items:center;
  position:relative;
}
.instr-body-container{
  position:relative;display:flex;
  align-items:center;justify-content:center;
}
.instr-svg{
  width:clamp(160px,26vmin,280px);height:auto;
  position:relative;z-index:2;
}
/* Breathing rings */
.ring-wrap{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:flex-start;
  justify-content:center;
  padding-top:clamp(22px,5vmin,40px);
  pointer-events:none;z-index:1;
}
.instr-ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(0,0,0,.3);
  animation:instrPulse 10s ease-in-out infinite;
}
@keyframes instrPulse{
  0%,100%{transform:scale(.7);opacity:.1}
  50%{transform:scale(1.6);opacity:.55}
}

/* HRV comparison */
.hrv-panel{
  margin-top:16px;width:100%;
  background:rgba(0,0,0,.03);
  border:1px solid rgba(0,0,0,.08);
  padding:10px 12px;
}
.hrv-panel-label{
  font-family:'JetBrains Mono',monospace;font-size:8px;
  letter-spacing:.22em;text-transform:uppercase;color:#aaa;
  margin-bottom:6px;
}
.hrv-row{
  display:flex;align-items:center;gap:8px;margin-bottom:4px;
}
.hrv-row-label{
  font-family:'JetBrains Mono',monospace;font-size:8px;
  letter-spacing:.12em;text-transform:uppercase;width:72px;flex-shrink:0;
}
.hrv-row-label.coherent{color:rgba(0,0,0,.5)}
.hrv-row-label.incoherent{color:rgba(200,50,50,.4)}

/* Right col — text */
.instr-text-col{display:flex;flex-direction:column;gap:14px}
.instr-heading{
  font-family:'Cinzel',serif;
  font-size:clamp(16px,2.5vw,26px);font-weight:400;
  letter-spacing:.2em;text-transform:uppercase;
  background:linear-gradient(180deg,#000 0%,#888 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-bottom:2px;
}
.instr-sub{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:.22em;text-transform:uppercase;color:#aaa;margin-bottom:4px;
}
.instr-science{
  font-size:clamp(12px,1.5vw,14px);line-height:1.7;color:#777;
  font-weight:300;font-style:italic;
  border-left:1px solid rgba(0,0,0,.14);padding-left:12px;
}
.step-block{display:flex;gap:14px;align-items:flex-start}
.step-num{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:rgba(0,0,0,.25);letter-spacing:.08em;
  flex-shrink:0;margin-top:2px;width:26px;
}
.step-title{
  font-family:'Cinzel',serif;font-size:12px;
  letter-spacing:.18em;text-transform:uppercase;color:#1f1f1f;margin-bottom:5px;
}
.step-desc{
  font-size:clamp(17px,2.25vw,22px);line-height:1.58;
  color:#777;font-weight:300;
}
.step-tip{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  color:#aaa;margin-top:5px;letter-spacing:.06em;
}

/* Duration selector */
.dur-label{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:.24em;color:#555;text-transform:uppercase;margin-bottom:14px;
  font-weight:500;
}
/* Full horizontal band: 6 options (1 / 5 / 10 / 15 / 30 / 60 min) */
.duration-row{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
}
.dur-btn{
  padding:16px 10px;background:#fff;
  border:1px solid rgba(0,0,0,.55);color:#000;
  font-family:'Cinzel',serif;font-size:13px;letter-spacing:.22em;
  text-transform:uppercase;text-align:center;
  cursor:pointer;transition:all .2s;
  position:relative;
}
.dur-btn:hover,.dur-btn:active{
  background:#000;color:#fff;
  box-shadow:0 0 22px rgba(0,0,0,.18);
  transform:translateY(-1px);
}
.dur-btn::after{
  content:'→';position:absolute;right:10px;top:50%;transform:translateY(-50%);
  opacity:0;transition:opacity .2s,right .2s;font-family:'JetBrains Mono',monospace;
}
.dur-btn:hover::after{opacity:1;right:7px}

/* Mobile: 2 rows of 3 so each button stays big and readable */
@media(max-width:720px){
  .duration-row{grid-template-columns:repeat(3,1fr);gap:8px}
  .dur-btn{padding:14px 6px;font-size:12px;letter-spacing:.18em}
}

/* Footer row — voice + duration laid out horizontally on desktop */
.instr-footer-row{
  display:grid;
  grid-template-columns:minmax(220px,1fr) 2.3fr;
  gap:32px;
  align-items:start;
  padding-top:28px;
  border-top:1px solid rgba(0,0,0,.07);
}
@media(max-width:720px){
  .instr-footer-row{
    grid-template-columns:1fr;
    gap:22px;
    padding-top:20px;
  }
}

/* ============================================================
   SCREEN 3 — SESSION
   ============================================================ */
#screen-session{background:#fff;justify-content:flex-start;padding-top:58px}

.session-hdr{
  position:fixed;top:0;left:0;right:0;
  padding:14px 20px;display:flex;
  justify-content:space-between;align-items:center;
  z-index:100;border-bottom:1px solid rgba(0,0,0,.08);
}
.session-title{
  font-family:'Cinzel',serif;font-size:11px;
  letter-spacing:.3em;text-transform:uppercase;color:rgba(0,0,0,.5);
}
.session-timer-disp{
  font-family:'JetBrains Mono',monospace;font-size:20px;
  font-weight:200;color:#000;letter-spacing:.08em;
  filter:drop-shadow(0 0 8px rgba(0,0,0,.25));
}
.session-end{
  background:transparent;border:1px solid rgba(0,0,0,.18);
  color:#999;font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:.2em;text-transform:uppercase;padding:6px 11px;
  cursor:pointer;transition:all .2s;
}
.session-end:hover{color:#000;border-color:rgba(0,0,0,.45)}

.session-main{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  width:100%;height:100%;
  gap:clamp(14px,2.5vh,26px);
}

/* Breath pacer */
.breath-container{
  position:relative;display:flex;align-items:center;justify-content:center;
  width:clamp(150px,32vmin,230px);height:clamp(150px,32vmin,230px);
  flex-shrink:0;
}
.breath-ring-svg{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;
}
.breath-ball{
  width:52%;height:52%;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,
    rgba(0,0,0,.09),rgba(0,0,0,.03) 55%,transparent 80%);
  border:1px solid rgba(0,0,0,.25);
  transition:transform 5s cubic-bezier(0.45,0,0.55,1),
             box-shadow 5s cubic-bezier(0.45,0,0.55,1);
  box-shadow:0 0 16px rgba(0,0,0,.06),inset 0 0 12px rgba(0,0,0,.04);
  z-index:2;
}
.breath-ball.inhale-state{
  transform:scale(1.65);
  box-shadow:0 0 55px rgba(0,0,0,.14),0 0 100px rgba(0,0,0,.05),
             inset 0 0 28px rgba(0,0,0,.08);
}
.breath-label{
  position:absolute;font-family:'Cinzel',serif;
  font-size:clamp(12px,2.5vmin,17px);letter-spacing:.22em;
  text-transform:uppercase;color:rgba(0,0,0,.88);
  pointer-events:none;z-index:3;
  filter:drop-shadow(0 0 6px rgba(0,0,0,.3));
  transition:opacity .5s;
}
.breath-countdown{
  position:absolute;bottom:-22px;
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:rgba(0,0,0,.35);letter-spacing:.08em;
}

/* Intro toggle checkbox */
.intro-toggle-row{
  display:flex;align-items:center;gap:10px;
  cursor:pointer;user-select:none;-webkit-user-select:none;
}
.intro-toggle-row input[type="checkbox"]{
  appearance:none;-webkit-appearance:none;
  width:14px;height:14px;flex-shrink:0;
  border:1px solid rgba(0,0,0,.35);
  background:transparent;cursor:pointer;
  position:relative;transition:border-color .18s,background .18s;
}
.intro-toggle-row input[type="checkbox"]:checked{
  background:#000;border-color:#000;
}
.intro-toggle-row input[type="checkbox"]:checked::after{
  content:'';position:absolute;
  left:3px;top:1px;width:5px;height:8px;
  border:1.5px solid #fff;border-top:none;border-left:none;
  transform:rotate(42deg);
}
.intro-toggle-label{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:.18em;text-transform:uppercase;color:#888;
  transition:color .18s;
}
.intro-toggle-row:hover .intro-toggle-label{color:#333}

/* Disabled toggle — used when zero-voice overrides intro toggle */
.intro-toggle-row.is-disabled{cursor:not-allowed;opacity:.38}
.intro-toggle-row.is-disabled input[type="checkbox"]{cursor:not-allowed}
.intro-toggle-row.is-disabled:hover .intro-toggle-label{color:#888}

/* Voice options cluster — groups intro + zero-voice into one quiet block */
.voice-options{
  display:flex;flex-direction:column;gap:9px;
  padding:11px 14px 12px;
  border:1px solid rgba(0,0,0,.08);
  border-radius:2px;
  background:rgba(0,0,0,.015);
}
.voice-options-label{
  font-family:'JetBrains Mono',monospace;font-size:8px;
  letter-spacing:.3em;text-transform:uppercase;color:rgba(0,0,0,.3);
  margin-bottom:2px;
}

/* Depth selector — Beginner / Intermediate / Expert
   Sits at the top of the instructions column so the user self-calibrates
   before they read. Three segments, one active, quiet typographic weight
   consistent with the rest of the instruction page. */
.depth-selector{
  display:flex;flex-direction:column;gap:6px;
  margin-bottom:4px;
}
.depth-selector-label{
  font-family:'JetBrains Mono',monospace;font-size:8px;
  letter-spacing:.3em;text-transform:uppercase;color:rgba(0,0,0,.3);
}
.depth-tabs{
  display:flex;
  border:1px solid rgba(0,0,0,.12);
  border-radius:2px;
  overflow:hidden;
  background:#fff;
}
.depth-tab{
  flex:1;
  padding:8px 6px;
  background:transparent;border:none;
  border-right:1px solid rgba(0,0,0,.08);
  font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:.18em;text-transform:uppercase;color:#888;
  cursor:pointer;transition:all .2s;
}
.depth-tab:last-child{border-right:none}
.depth-tab:hover{color:#222;background:rgba(0,0,0,.025)}
.depth-tab.active{
  background:#111;color:#fff;
  letter-spacing:.2em;
}
.depth-tab.active:hover{background:#000;color:#fff}

/* Depth-conditional content blocks — only active depth is shown */
.depth-content{display:none}
.depth-content.active{display:block}

/* Expert-only science footnote — tiny, citation-style block */
.instr-footnote{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;line-height:1.65;
  color:rgba(0,0,0,.42);
  letter-spacing:.02em;
  border-top:1px solid rgba(0,0,0,.08);
  padding-top:10px;margin-top:4px;
}
.instr-footnote strong{
  color:rgba(0,0,0,.6);font-weight:400;letter-spacing:.1em;
  text-transform:uppercase;font-size:8px;display:block;margin-bottom:4px;
}

/* ════════════ THEORY SECTION ════════════
   Scholarly reading block sitting between the header and the
   technique. Kept visually distinct from the protocol below. */
.instr-theory-row{
  padding:28px 0 8px;
  border-top:1px solid rgba(0,0,0,.08);
  border-bottom:1px solid rgba(0,0,0,.08);
}
.theory-lede{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:clamp(20px,2.6vw,26px);
  line-height:1.65;
  color:#333;
  font-weight:300;
  font-style:italic;
  max-width:780px;
  margin:0 auto 28px;
  text-align:center;
  padding:0 12px;
}
.theory-lede em{
  font-style:normal;
  color:#000;
  border-bottom:1px solid rgba(0,0,0,.3);
  padding-bottom:1px;
}
.theory-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:28px 40px;
}
.theory-card{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.theory-card-eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  letter-spacing:.28em;
  text-transform:uppercase;
  color:#999;
}
.theory-card-title{
  font-family:'Cinzel',serif;
  font-size:clamp(13px,1.5vw,15px);
  letter-spacing:.14em;
  text-transform:uppercase;
  color:#1a1a1a;
  font-weight:500;
  margin-bottom:2px;
}
.theory-card-body{
  font-size:clamp(17.5px,2.1vw,22px);
  line-height:1.65;
  color:#555;
  font-weight:300;
}
.theory-card-body strong{
  color:#1a1a1a;
  font-weight:500;
}
.theory-card-body em{
  font-style:italic;
  color:#333;
}
.theory-divider{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  letter-spacing:.3em;
  text-transform:uppercase;
  color:#aaa;
  text-align:center;
  margin:32px 0 4px;
  position:relative;
}
.theory-divider::before,
.theory-divider::after{
  content:'';
  position:absolute;top:50%;
  width:calc(50% - 100px);
  height:1px;background:rgba(0,0,0,.08);
}
.theory-divider::before{left:0}
.theory-divider::after{right:0}

@media(max-width:720px){
  .instr-theory-row{padding:22px 0 6px}
  .theory-lede{
    font-size:14px;line-height:1.7;
    margin-bottom:22px;padding:0 4px;
  }
  .theory-grid{
    grid-template-columns:1fr;
    gap:22px;
  }
  .theory-divider{margin:22px 0 2px}
  .theory-divider::before,
  .theory-divider::after{width:calc(50% - 80px)}
}

/* Trauma-sensitivity note — only shown at beginner depth */
.instr-safety{
  font-size:11px;line-height:1.6;color:#888;font-weight:300;
  background:rgba(0,0,0,.02);
  border-left:1px solid rgba(0,0,0,.14);
  padding:8px 11px;
  margin-top:2px;
}

/* Full-screen intro overlay */
.intro-overlay{
  position:fixed;inset:0;
  background:#fff;
  display:none;              /* hidden until beginSession() shows it */
  align-items:center;justify-content:center;
  z-index:200;
  opacity:1;
  transition:opacity 1s ease;
}
.intro-overlay.visible{display:flex}
.intro-overlay.fading{opacity:0;pointer-events:none}
.intro-inner{
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(18px,3vh,34px);
  padding:30px 20px;
  text-align:center;max-width:440px;
}
.intro-orb-wrap{
  position:relative;
  width:clamp(90px,18vmin,130px);height:clamp(90px,18vmin,130px);
}
.intro-orb{
  width:100%;height:100%;border-radius:50%;
  border:1px solid rgba(0,0,0,.18);
  background:radial-gradient(circle at 42% 38%,rgba(0,0,0,.05),transparent 70%);
  animation:introBreath 4.5s ease-in-out infinite;
}
@keyframes introBreath{
  0%,100%{transform:scale(.88);box-shadow:0 0 20px rgba(0,0,0,.04),0 0 60px rgba(0,0,0,.02)}
  50%{transform:scale(1.12);box-shadow:0 0 40px rgba(0,0,0,.09),0 0 90px rgba(0,0,0,.04)}
}
.intro-timer-row{
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.intro-cd-num{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(36px,7vw,62px);font-weight:200;
  color:rgba(0,0,0,.55);letter-spacing:-.02em;
  line-height:1;
}
.intro-cd-label{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:.3em;text-transform:uppercase;color:rgba(0,0,0,.25);
}
.intro-text-block{
  min-height:3.2em;display:flex;align-items:center;justify-content:center;
}
.intro-line{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:clamp(15px,2.4vw,20px);font-weight:300;font-style:italic;
  line-height:1.7;color:rgba(0,0,0,.58);
  transition:opacity .5s ease;
  max-width:360px;
}

/* Phase instruction */
.phase-panel{text-align:center;max-width:380px;padding:0 16px}
.phase-step-label{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:.28em;text-transform:uppercase;color:#aaa;margin-bottom:9px;
}

/* ═══════════════════════════════════════════════════════════════
   VITRUVIAN INTRO — full-page manuscript composition
   Image is 933×1400, aspect ratio \~2:3
   Layout: top parchment band (title + "Why?" reveal)
           middle (figure, untouched)
           bottom parchment band (touch hint)
   ═══════════════════════════════════════════════════════════════ */

.vitruvian-frame{
  position:fixed;inset:0;
  z-index:0;
  overflow:hidden;
  pointer-events:none;
}
.vitruvian-img{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:100%;height:100%;
  object-fit:cover;
  object-position:center;
  filter:contrast(1.04) saturate(1.08) brightness(1.01);
}

/* Top parchment band — cream fade from top, strong where text sits,
   dissolving into the image below */
.parchment-top{
  position:fixed;
  top:0;left:0;right:0;
  height:32vh;
  z-index:5;
  pointer-events:none;
  background:linear-gradient(180deg,
    rgba(250,241,218,0.96) 0%,
    rgba(250,241,218,0.92) 38%,
    rgba(250,241,218,0.70) 62%,
    rgba(250,241,218,0.28) 82%,
    rgba(250,241,218,0.00) 100%);
}
/* Ornamental hairline at the base of the top band — DISABLED.
   At bottom:28% of a 32vh band (\~23vh from viewport top) this line
   rendered directly across the Vitruvian figure's chin on mobile.
   Neutralised here at source so no later cascade can re-enable it. */
.parchment-top::after{ display:none !important; }

/* Bottom parchment band — cream fade up from bottom */
.parchment-bottom{
  position:fixed;
  bottom:0;left:0;right:0;
  height:18vh;
  z-index:5;
  pointer-events:none;
  background:linear-gradient(0deg,
    rgba(250,241,218,0.92) 0%,
    rgba(250,241,218,0.72) 40%,
    rgba(250,241,218,0.30) 75%,
    rgba(250,241,218,0.00) 100%);
}
.parchment-bottom::before{
  content:'';
  position:absolute;
  left:20%;right:20%;top:32%;
  height:1px;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(50,28,8,0.35) 50%,
    transparent 100%);
}

/* Intro screen transparent · only the Stage One icon is clickable */
#screen-intro{background:transparent;cursor:default;overflow:hidden}

/* Hide global stars/vignette when intro is active — they fight the image */
body:has(#screen-intro:not(.hidden)) .stars,
body:has(#screen-intro:not(.hidden)) .vignette{ opacity:0 }

#screen-intro header{ z-index:20; }

/* ─ "Why? The Question that no longer begs." — reveal button ─
   Sits directly beneath the Project Meaning title in the intro header.

   interactive elements. Styling matches the Cinzel/parchment palette. */
#screen-intro .why-question-btn{

  backdrop-filter:blur(2px);

#screen-intro .why-question-btn:focus-visible{

/* The reveal is a small card/popover — own background, border, shadow —
   so it visually springs from the button instead of bleeding into the
   Vitruvian figure behind the header. Border + radius match the button
   so the two elements read as related. */
#screen-intro .why-answer{
  position:relative;
  max-height:0;
  opacity:0;
  overflow:hidden;
  -webkit-overflow-scrolling:touch;
  touch-action:pan-y;
  overscroll-behavior:contain;
  margin-top:0;
  padding:12px 24px;
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:clamp(14px,2.1vw,18px);
  line-height:1.55;
  font-style:italic;
  color:#2a1400;

  max-width:min(640px,92vw);
  background:rgba(250,241,218,0.97);
  border:1px solid rgba(90,54,20,0.4);
  border-radius:2px;
  box-shadow:0 4px 14px rgba(50,28,8,0.28),
             0 1px 3px rgba(50,28,8,0.18);
  -webkit-backdrop-filter:blur(3px);
  backdrop-filter:blur(3px);
  pointer-events:none;
  transition:max-height .6s cubic-bezier(0.4,0,0.2,1),
             opacity .45s ease .1s,
             margin-top .4s ease;
}
/* Small tick pointing up at the button — purely decorative, anchors the
   box visually to the button it opens from. Rendered with two stacked
   triangles so the border is preserved. */
#screen-intro .why-answer::before,
#screen-intro .why-answer::after{
  content:"";
  position:absolute;
  left:50%;
  width:0;
  height:0;
  border-left:7px solid transparent;
  border-right:7px solid transparent;
  pointer-events:none;
}
#screen-intro .why-answer::before{
  top:-8px;
  transform:translateX(-50%);
  border-bottom:8px solid rgba(90,54,20,0.4);
}
#screen-intro .why-answer::after{
  top:-7px;
  transform:translateX(-50%);
  border-bottom:7px solid rgba(250,241,218,0.96);
}
#screen-intro .why-answer.show{
  /* max-height is set inline by toggleWhyAnswer() to match the box's
     own scrollHeight, so the popover expands exactly to fit whatever
     length of text the <div id="whyAnswer"> currently contains. */
  opacity:1;
  margin-top:10px;
  pointer-events:auto;
}

/* ─ STAGE ONE ICON — Golden heart, placed beneath the vitruvian body.
   The single interactive surface of the intro screen. ─ */
#stage1-icon{
  position:fixed;
  left:12.5%;
  bottom:clamp(40px, 7vh, 95px);
  transform:translateX(-50%);
  width:clamp(122px, 20vmin, 200px);
  height:clamp(122px, 20vmin, 200px);
  z-index:18;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .55s cubic-bezier(.4,0,.2,1);
}
/* The image itself carries the heartbeat animation — keeping the pulse
   isolated to the heart so the typographic labels stay perfectly still.
   Scaled to 130% of the container so the bright heart+rays core (which
   only fills \~45% of the PNG canvas; the rest is faint halo that fades
   into the cream Vitruvian backdrop) visually matches the dense Stage
   3/4 locked-mandala discs. Overflow bleeds into the transparent flex
   padding — the container has no overflow:hidden, so the faint halo
   is free to extend naturally. */
#stage1-icon img{
  /* 125% (down from 130%). The heart PNG has glowing amber rays baked into
     the pixels which make it read slightly larger than Stage 2/3/4. Trimming
     the image scale by a few percent brings the visible heart extent into
     tighter parity with the mandala and the locked discs. */
  width:125%;
  height:125%;
  object-fit:contain;
  display:block;
  transform-origin:center center;
  will-change:transform, filter;
  animation:heartBeat 3.4s cubic-bezier(.25,.46,.45,.94) infinite;
}
#stage1-icon:hover{ transform:translateX(-50%) scale(1.045); }
#stage1-icon:hover img{
  animation-duration:2.8s;   /* heart quickens slightly under attention */
}
#stage1-icon:active{ transform:translateX(-50%) scale(.98); }
.stage-icon-label{
  position:absolute;
  bottom:-6px;
  left:50%;
  transform:translateX(-50%);
  font-family:'Cinzel',serif;
  font-size:clamp(12px, 1.55vw, 16px);
  font-weight:500;
  letter-spacing:.34em;
  text-transform:uppercase;
  color:rgba(40,20,4,0.92);
  text-shadow:
    0 0 8px rgba(250,241,218,1),
    0 0 14px rgba(250,241,218,0.85),
    0 1px 1px rgba(250,241,218,1);
  white-space:nowrap;
  pointer-events:none;
}
.stage-icon-sublabel{
  position:absolute;
  bottom:-28px;
  left:50%;
  transform:translateX(-50%);
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(8.5px, 0.95vw, 10.5px);
  letter-spacing:.24em;
  text-transform:uppercase;
  color:rgba(50,28,8,0.62);
  text-shadow:0 0 6px rgba(250,241,218,1);
  white-space:nowrap;
  pointer-events:none;
}
/* ─ Cardiac heartbeat ─ physiologically shaped lub-dub (S1 punch, then
     smaller S2 at aortic closure), followed by a long diastolic rest.
     Glow intensity rides the same waveform, blooming with each beat
     and settling during diastole. Scale stays under \~9% to keep the
     pulse felt but never manic. */
@keyframes heartBeat{
  /* Diastole — baseline */
  0%   { transform:scale(1.000);
         filter: drop-shadow(0 0 14px rgba(255,180,45,.38))
                 drop-shadow(0 0 32px rgba(255,155,25,.18)); }
  /* S1 — systolic punch (lub) */
  4%   { transform:scale(1.095);
         filter: drop-shadow(0 0 24px rgba(255,215,95,.74))
                 drop-shadow(0 0 52px rgba(255,170,35,.44)); }
  /* Isovolumic relaxation */
  10%  { transform:scale(1.018);
         filter: drop-shadow(0 0 16px rgba(255,190,55,.46))
                 drop-shadow(0 0 38px rgba(255,160,28,.26)); }
  /* S2 — aortic closure (dub), smaller */
  16%  { transform:scale(1.055);
         filter: drop-shadow(0 0 20px rgba(255,205,75,.60))
                 drop-shadow(0 0 44px rgba(255,165,30,.34)); }
  /* Return to rest */
  24%  { transform:scale(1.000);
         filter: drop-shadow(0 0 14px rgba(255,180,45,.38))
                 drop-shadow(0 0 32px rgba(255,155,25,.18)); }
  /* Long diastolic rest — \~76% of the cycle */
  100% { transform:scale(1.000);
         filter: drop-shadow(0 0 14px rgba(255,180,45,.38))
                 drop-shadow(0 0 32px rgba(255,155,25,.18)); }
}
/* Respect the user's motion preferences — replace the pulse with a
   gentle glow breath, no scale, no punchy timing. */
@media (prefers-reduced-motion: reduce){
  #stage1-icon img{
    animation:heartGlowBreath 6.4s ease-in-out infinite;
  }
  @keyframes heartGlowBreath{
    0%,100%{ transform:scale(1);
             filter: drop-shadow(0 0 14px rgba(255,180,45,.38))
                     drop-shadow(0 0 32px rgba(255,155,25,.18)); }
    50%    { transform:scale(1);
             filter: drop-shadow(0 0 22px rgba(255,205,70,.58))
                     drop-shadow(0 0 46px rgba(255,170,32,.34)); }
  }
}
/* Short-viewport safeguard */
@media (max-height:680px){
  #stage1-icon{
    bottom:clamp(28px, 5.5vh, 72px);
    width:clamp(74px, 11.5vmin, 118px);
    height:clamp(74px, 11.5vmin, 118px);
  }
}

/* ══════════════════════════════════════════════════════════════════
   STAGE TWO — INTEROCEPTIVE MAPPING
   Icon • Instructions • Session • Completion.

<script>
  (function(){

// ═══════════════════════════════════════════════════════════════════════
// STAGE TWO — Interoceptive Mapping flow
// Icon → instructions → session (arrive · map · calibrate · translate) →
// completion. Independent state from Stage One; shares only the
// screen-navigation helper and the back-button affordance.
// ═══════════════════════════════════════════════════════════════════════

// Mapping chain — the 7 dimensions, each with a rigorous phenomenological prompt.
// Provenance: Location (McGill Pain Questionnaire body chart, Melzack 1975; Craig's
// interoceptive somatotopy). Quality (MPQ sensory descriptors + Craig's homeostatic
// modality classes). Intensity (VAS/NRS ratio-scale, Price et al. 1983). Movement (MPQ
// temporal subclass — flickering/throbbing/pulsing/beating/pounding). Direction (MPQ
// spatial descriptors — shooting/radiating/spreading). Coherence (SIBAM gestalt,
// Levine). Meaning-tone (Gendlin's "handle" + Russell's valence circumplex).
const S2_DIMENSIONS = [
  { label:'LOCATION',     prompt:'Where in the body is the sensation? Name the area in the simplest physical words — chest, throat, belly, jaw, hands, shoulders. Does it have a clear edge, or does it fade out into the surrounding area? Don&rsquo;t explain it yet. Just say where it is.' },
  { label:'QUALITY',      prompt:'What does it feel like, as a pure sensation? Use plain physical words: pressure, heat, cold, tightness, hollowness, density, fluttering, buzzing, sharpness, dullness, heaviness, lightness. Pick the word that actually fits — not the one that sounds deep.' },
  { label:'INTENSITY',    prompt:'How strong is the sensation itself, on a 0&ndash;10 scale? Rate the sensation, not the emotion attached to it. A strong feeling can sit on top of a faint sensation, and a very physical sensation can carry almost no emotion. Keep them separate.' },
  { label:'MOVEMENT',     prompt:'Is it still, or is it moving? Pulsing, spreading, rising, shrinking, flickering, throbbing? Is it steady, or does it come in waves? Describe the movement itself — not what you think the movement means.' },
  { label:'DIRECTION',    prompt:'Which way is the sensation going? Toward you, away from you, up, down, inward, outward, radiating from a centre, shooting from one point to another? If there&rsquo;s no clear direction, say so — the sensation is simply staying put.' },
  { label:'COHERENCE',    prompt:'Is the sensation one clear thing, or several things at once? Check four layers and see if they match up: the raw sensation, the image or picture it brings to mind, the thing the body wants to do, and the tone it carries. Are they pointing the same way, or pulling apart?' },
  { label:'MEANING-TONE', prompt:'Before naming an emotion, what is the <em>tone</em> of the sensation? Pleasant, unpleasant, or neutral? Drawing you toward something, pushing you away, or holding still? If a short phrase fits — &ldquo;a bracing alertness&rdquo;, &ldquo;a quiet pulling&rdquo; — use it. That short phrase isn&rsquo;t an interpretation. It&rsquo;s just the tone, named.' },
];

// Phase architecture — fractions of total session time.
// Arrive · Mapping (7 dimensions distributed evenly) · Calibrate · Translate.
// Calibrate and Translate phases carry multiple sub-prompts that rotate within
// the phase so each sub-construct (accuracy/sensibility/M-ratio for Calibrate;
// signal→salience→appraisal→action-readiness for Translate) receives attention.
const S2_PHASES = [
  { k:'arrive',    from:0.00, to:0.12,
    label:'Phase · Arrive',
    prompts:[
      'Let the breath stay slow — about five to six breaths per minute. Feel the ground under your feet and seat. Let one sensation in your body come forward on its own. You are not searching for it — you are receiving it. Whatever shows up first is what you will work with.',
      'Commit to that sensation. Put your attention <em>inside</em> the part of the body holding it, rather than watching it from outside. If a light hand on your chest, side ribs, or lower belly helps, use it for a moment, then take it away once your attention can stay on its own.'
    ] },
  { k:'mapping',   from:0.12, to:0.68 /* dynamic dimension within */ },
  { k:'calibrate', from:0.68, to:0.88,
    label:'Phase · Calibrate',
    prompts:[
      '<strong>Accuracy check.</strong> How closely does what you described match what is actually happening in the body? If you honestly can&rsquo;t tell, say so. A truthful &ldquo;I don&rsquo;t know&rdquo; is more accurate than a confident guess.',
      '<strong>Attention check.</strong> How inside the body were you, versus watching from outside and narrating? Being inside isn&rsquo;t a performance — it&rsquo;s just where your attention actually was.',
      '<strong>Confidence check.</strong> On a 0&ndash;10 scale, how sure are you about what you just described? Now notice: strong feelings often carry weak precision. The gap between your confidence and how right you likely are — that gap is the thing you&rsquo;re training. Note where you expect to be most wrong.'
    ] },
  { k:'translate', from:0.88, to:1.01,
    label:'Phase · Translate',
    prompts:[
      '<strong>What it grabs.</strong> What is this sensation doing to your attention right now? Is it making certain worries louder, or muting other things that usually matter to you?',
      '<strong>What it suggests.</strong> What interpretation is the sensation pushing you toward? Threat, promise, obligation, shame, curiosity? Name the interpretation out loud without buying into it.',
      '<strong>What the body wants to do.</strong> What is the body getting ready for — move toward, pull away, brace, soften, reach out, hide? This is the moment a sensation turns into meaning. Watch it form. Don&rsquo;t automatically go along with it. You are the reader, not the reading.'
    ] },
];

// Positions around the outer mandala ring corresponding to each dimension.
// Eight equal angles starting at the top; we use the first seven.
// Radius 104 (outer ring), center (110,110).
const S2_MARKER_POS = (()=>{
  const arr = [];
  const r = 104, cx = 110, cy = 110;
  for (let i = 0; i < 7; i++){
    const theta = -Math.PI/2 + (i / 7) * 2 * Math.PI;
    arr.push({ x: cx + r * Math.cos(theta), y: cy + r * Math.sin(theta) });
  }
  return arr;
})();

// Session state
let s2sTotal = 0;
let s2sRemaining = 0;
let s2sInterval = null;
let s2sLastDim = -1;
let s2sLastPhase = null;
let s2sLastSubIdx = -1;
// Peek state — lets the user tap a dimension chip during the session to
// re-read that prompt without affecting the timer. null = live view.
let s2sPeekDim = null;

function startStage2WithDuration(secs){
  s2sTotal = secs;
  s2sRemaining = secs;
  s2sLastDim = -1;
  s2sLastPhase = null;
  s2sLastSubIdx = -1;
  s2sPeekDim = null;

  // Reset chain chips
  document.querySelectorAll('#s2s-chain .s2s-chip').forEach(c=>{
    c.classList.remove('active','done','peek');
  });

  // Reset marker to top
  const marker = document.getElementById('s2s-marker');
  if (marker){ marker.setAttribute('cx', S2_MARKER_POS[0].x); marker.setAttribute('cy', S2_MARKER_POS[0].y); }

  showScreen('screen-stage2-session');
  renderStage2(true);

  if (s2sInterval) clearInterval(s2sInterval);
  s2sInterval = setInterval(()=>{
    s2sRemaining--;
    if (s2sRemaining <= 0){
      clearInterval(s2sInterval);
      s2sInterval = null;
      showStage2Completion();
      return;
    }
    renderStage2(false);
  }, 1000);
}

function pad2(n){ return String(n).padStart(2,'0'); }

function renderStage2(force){
  // Timer
  const mm = pad2(Math.floor(s2sRemaining / 60));
  const ss = pad2(s2sRemaining % 60);
  const timer = document.getElementById('s2s-timer');
  if (timer) timer.textContent = mm + ':' + ss;

  // Progress (percent elapsed, 0..1)
  const pct = Math.min(1, 1 - (s2sRemaining / s2sTotal));
  const bar = document.getElementById('s2s-progress-fill');
  if (bar) bar.style.width = (pct * 100).toFixed(2) + '%';

  // If the user is peeking at a dimension (tapped a chip), leave that
  // prompt on screen. Timer and progress keep advancing above.
  if (s2sPeekDim !== null) return;

  // Determine phase
  let phase = S2_PHASES.find(p => pct >= p.from && pct < p.to) || S2_PHASES[0];

  if (phase.k === 'mapping'){
    // Determine current dimension within mapping phase.
    const phasePct = (pct - phase.from) / (phase.to - phase.from);
    const dimIdx = Math.min(
      S2_DIMENSIONS.length - 1,
      Math.max(0, Math.floor(phasePct * S2_DIMENSIONS.length))
    );
    const dim = S2_DIMENSIONS[dimIdx];

    if (force || dimIdx !== s2sLastDim || s2sLastPhase !== 'mapping'){
      setStage2Display(dim.label, 'Phase · Mapping  ·  ' + (dimIdx + 1) + ' / 7', dim.prompt);
      updateStage2Chain(dimIdx);
      moveStage2Marker(dimIdx);
      s2sLastDim = dimIdx;
      s2sLastPhase = 'mapping';
    }
  } else {
    // Arrive, calibrate, translate — non-dimension phases with rotating sub-prompts.
    const subPrompts = phase.prompts || [];
    const phasePct = (pct - phase.from) / (phase.to - phase.from);
    const subIdx = subPrompts.length > 0
      ? Math.min(subPrompts.length - 1, Math.max(0, Math.floor(phasePct * subPrompts.length)))
      : 0;

    if (force || s2sLastPhase !== phase.k || subIdx !== s2sLastSubIdx){
      const centerText = phase.k === 'arrive'    ? 'Arrive'
                       : phase.k === 'calibrate' ? 'Calibrate'
                                                  : 'Translate';
      const subLabel = subPrompts.length > 1
        ? phase.label + '  ·  ' + (subIdx + 1) + ' / ' + subPrompts.length
        : phase.label;
      const promptText = subPrompts[subIdx] || '';
      setStage2Display(centerText, subLabel, promptText);

      // Chain chips: reset on arrive, mark all done on calibrate/translate
      if (phase.k === 'calibrate' || phase.k === 'translate'){
        document.querySelectorAll('#s2s-chain .s2s-chip').forEach(c=>{
          c.classList.remove('active');
          c.classList.add('done');
        });
      } else if (phase.k === 'arrive'){
        document.querySelectorAll('#s2s-chain .s2s-chip').forEach(c=>{
          c.classList.remove('active','done');
        });
      }
      s2sLastPhase = phase.k;
      s2sLastDim = -1;
      s2sLastSubIdx = subIdx;
    }
  }
}

function setStage2Display(centerText, phaseLabel, promptText){
  const c = document.getElementById('s2s-center');
  const l = document.getElementById('s2s-phase-label');
  const p = document.getElementById('s2s-prompt');

  // Brief crossfade for label + prompt; the center label changes more softly.
  if (c && c.textContent !== centerText){
    c.classList.add('fading');
    setTimeout(()=>{ c.textContent = centerText; c.classList.remove('fading'); }, 320);
  }
  if (l) l.textContent = phaseLabel;
  // Prompt uses innerHTML because calibrate/translate sub-prompts contain
  // <strong> and <em> tags for construct labelling. Comparison is via data-text
  // attribute so we compare source strings, not rendered HTML.
  if (p && p.getAttribute('data-text') !== promptText){
    p.classList.add('fading');
    setTimeout(()=>{
      p.innerHTML = promptText;
      p.setAttribute('data-text', promptText);
      p.classList.remove('fading');
    }, 360);
  }
}

function updateStage2Chain(activeIdx){
  document.querySelectorAll('#s2s-chain .s2s-chip').forEach(c=>{
    const i = parseInt(c.dataset.dim, 10);
    c.classList.remove('active','done');
    if (i < activeIdx) c.classList.add('done');
    else if (i === activeIdx) c.classList.add('active');
  });
}

function moveStage2Marker(idx){
  const marker = document.getElementById('s2s-marker');
  if (!marker) return;
  const pos = S2_MARKER_POS[idx] || S2_MARKER_POS[0];
  marker.setAttribute('cx', pos.x.toFixed(2));
  marker.setAttribute('cy', pos.y.toFixed(2));
}

// ─── Dimension peek ──────────────────────────────────────────────
// Tapping a dimension chip during a session shows that dimension's prompt
// on screen so the user can re-read an instruction they may have missed or
// forgotten. The timer and progress bar keep advancing underneath; only the
// center label, phase label, and prompt text are overridden.
// Tap the same chip again — or tap a different chip — to switch peek or
// return to the live display.
function peekStage2Dimension(idx){
  if (typeof idx !== 'number' || idx < 0 || idx >= S2_DIMENSIONS.length) return;
  // Second tap on the same chip → exit peek and resume live view.
  if (s2sPeekDim === idx){
    exitStage2Peek();
    return;
  }
  // Enter peek (or switch to a different chip).
  s2sPeekDim = idx;
  const dim = S2_DIMENSIONS[idx];
  // Mark only the peeked chip with the .peek class; active/done classes
  // continue to reflect the live session state underneath.
  document.querySelectorAll('#s2s-chain .s2s-chip').forEach(c=>{
    const i = parseInt(c.dataset.dim, 10);
    c.classList.toggle('peek', i === idx);
  });
  setStage2Display(
    dim.label,
    'Re-reading · ' + dim.label + '  ·  tap again to return',
    dim.prompt
  );
}

function exitStage2Peek(){
  if (s2sPeekDim === null) return;
  s2sPeekDim = null;
  document.querySelectorAll('#s2s-chain .s2s-chip').forEach(c=>{
    c.classList.remove('peek');
  });
  // Reset the "last displayed" trackers so the next renderStage2 call will
  // force a fresh update back to whatever the live state is now.
  s2sLastDim = -1;
  s2sLastPhase = null;
  s2sLastSubIdx = -1;
  renderStage2(true);
}

function endStage2Session(){
  if (s2sInterval){ clearInterval(s2sInterval); s2sInterval = null; }
  showScreen('screen-intro');
}

function showStage2Completion(){
  const el = document.getElementById('stage2-completion');
  if (el) el.classList.add('show');
}

function restartStage2ToIntro(){
  const el = document.getElementById('stage2-completion');
  if (el) el.classList.remove('show');
  showScreen('screen-intro');
}

// ─── "Why? The Question that no longer begs." — reveal toggle ──────
// Shows / hides the prose box beneath the button in the intro header.
// maxHeight is set inline to fit the content, but CAPPED to the space
// between the box's top and the bottom of the viewport (minus a small
// gutter). If content exceeds the cap, overflow-y:auto is enabled AFTER
// the expand animation so the user can scroll inside the box with touch
// gestures — the page itself can't scroll (fixed header), so internal
// scroll is the only way to reach long text on mobile.
function fitWhyAnswerToViewport(ans){
  const rect = ans.getBoundingClientRect();
  const gutter = 24;
  const maxAvail = Math.max(window.innerHeight - rect.top - gutter, 160);
  const target = Math.min(ans.scrollHeight, maxAvail);
  return target;
}
function toggleWhyAnswer(){
  const btn = document.getElementById('whyQuestionBtn');
  const ans = document.getElementById('whyAnswer');
  if (!btn || !ans) return;
  const isOpen = ans.classList.toggle('show');
  btn.classList.toggle('open', isOpen);
  btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  ans.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
  if (isOpen){
    // Clip content during the expand animation so nothing spills.
    ans.style.overflowY = 'hidden';
    ans.style.maxHeight = fitWhyAnswerToViewport(ans) + 'px';
    // Once the box has finished expanding, hand over to native scrolling.
    setTimeout(() => {
      if (ans.classList.contains('show')){
        ans.style.overflowY = 'auto';
      }
    }, 650);
  } else {
    // Clip first so the collapse animation doesn't reveal content as it shrinks.
    ans.style.overflowY = 'hidden';
    ans.style.maxHeight = '0';
    ans.scrollTop = 0;
  }
}
// Re-fit on viewport changes (rotation, keyboard, window resize) so the
// box never exceeds the available space and always permits scrolling if
// its content is too tall.
window.addEventListener('resize', () => {
  const ans = document.getElementById('whyAnswer');
  if (ans && ans.classList.contains('show')){
    const scrollOverflow = ans.style.overflowY;
    // Briefly unset overflow/max-height so scrollHeight reflects full content.
    ans.style.overflowY = 'hidden';
    ans.style.maxHeight = 'none';
    const target = fitWhyAnswerToViewport(ans);
    ans.style.maxHeight = target + 'px';
    // Restore scroll capability only if we had handed over to native scroll.
    ans.style.overflowY = scrollOverflow === 'auto' ? 'auto' : 'hidden';
    // If animation hadn't completed yet when resize fired, schedule the flip.
    if (scrollOverflow !== 'auto'){
      setTimeout(() => {
        if (ans.classList.contains('show')) ans.style.overflowY = 'auto';
      }, 650);
    }
  }
});

</script>
