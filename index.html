<div id="countdown"><div class="title">Project<span class="void"></span>Meaning<span class="dash">—</span><span class="unlock">Unlock</span></div><div class="label">Countdown · April 21, 2026 · New York</div><div class="clock"><div class="unit"><div class="num" id="cd-d">00</div><div class="tag">Days</div></div><div class="sep">:</div><div class="unit"><div class="num" id="cd-h">00</div><div class="tag">Hours</div></div><div class="sep">:</div><div class="unit"><div class="num" id="cd-m">00</div><div class="tag">Min</div></div><div class="sep">:</div><div class="unit"><div class="num" id="cd-s">00</div><div class="tag">Sec</div></div></div><div class="sub" id="cd-now">— : — : — — ET</div></div>

<div class="vignette"></div><div id="markers"></div>

<script>
// Target: April 21, 2026 00:00 America/New_York (EDT, UTC-4) = April 21, 2026 04:00:00 UTC
const TARGET=Date.UTC(2026,3,21,4,0,0);
const pad=n=>String(n).padStart(2,'0');
const elD=document.getElementById('cd-d'),elH=document.getElementById('cd-h'),elM=document.getElementById('cd-m'),elS=document.getElementById('cd-s'),elNow=document.getElementById('cd-now');
function tickCountdown(){
  const now=Date.now();let diff=Math.max(0,TARGET-now);
  const d=Math.floor(diff/86400000);diff-=d*86400000;
  const h=Math.floor(diff/3600000);diff-=h*3600000;
  const m=Math.floor(diff/60000);diff-=m*60000;
  const s=Math.floor(diff/1000);
  elD.textContent=pad(d);elH.textContent=pad(h);elM.textContent=pad(m);elS.textContent=pad(s);
  // Current Los Angeles time in 12-hour format
  try{
    elNow.textContent='Now in NY · '+new Date().toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true});
  }catch(e){}
}
tickCountdown();setInterval(tickCountdown,1000);
</script>
<script type="importmap">{"imports":{"three":"https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js"}}</script>
<script type="module">
import * as THREE from 'three';

const canvas=document.getElementById('c');
const markers=document.getElementById('markers');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(42,1,0.1,100);
camera.position.set(0,-1.1,8.6);camera.lookAt(0,-1.1,0);

// Lights for subtle glass shading
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const l1=new THREE.DirectionalLight(0xffffff,1.1);l1.position.set(3,4,5);scene.add(l1);
const l2=new THREE.DirectionalLight(0xaaaaaa,0.7);l2.position.set(-4,-2,3);scene.add(l2);
const l3=new THREE.PointLight(0x888888,0.6);l3.position.set(0,3,-4);scene.add(l3);

// The dodecahedron — group holds solid glass + wireframe so they rotate together
const group=new THREE.Group();scene.add(group);

const geo=new THREE.DodecahedronGeometry(1.55,0);

// Glass faces
const glass=new THREE.MeshPhysicalMaterial({
  color:0xdddddd,
  metalness:0.1,
  roughness:0.15,
  transmission:0.92,
  thickness:0.8,
  transparent:true,
  opacity:0.35,
  ior:1.35,
  clearcoat:1,
  clearcoatRoughness:0.15,
  side:THREE.DoubleSide,
  emissive:0x111111,
  emissiveIntensity:0.25
});
const mesh=new THREE.Mesh(geo,glass);
group.add(mesh);

// Edges in bright cyan/violet
const edges=new THREE.EdgesGeometry(geo,0.1);
const edgeMat=new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:1});
const edgeLines=new THREE.LineSegments(edges,edgeMat);
group.add(edgeLines);

// Inner faint core for depth
const coreGeo=new THREE.DodecahedronGeometry(0.55,0);
const coreMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0,wireframe:true});
group.add(new THREE.Mesh(coreGeo,coreMat));

// Compute the 12 face centers (local space). DodecahedronGeometry has 36 triangles = 12 faces * 3 tris.
// Each group of 3 consecutive triangles shares a face center.
const posAttr=geo.attributes.position;
const faceCenters=[];
// Build triangles, cluster by coplanar normal & shared center
const tris=[];
for(let i=0;i<posAttr.count;i+=3){
  const a=new THREE.Vector3().fromBufferAttribute(posAttr,i);
  const b=new THREE.Vector3().fromBufferAttribute(posAttr,i+1);
  const c=new THREE.Vector3().fromBufferAttribute(posAttr,i+2);
  const center=new THREE.Vector3().add(a).add(b).add(c).divideScalar(3);
  const normal=new THREE.Vector3().subVectors(b,a).cross(new THREE.Vector3().subVectors(c,a)).normalize();
  tris.push({center,normal});
}
// Group triangles whose normals match (same face)
const used=new Array(tris.length).fill(false);
for(let i=0;i<tris.length;i++){
  if(used[i])continue;
  const bucket=[tris[i]];used[i]=true;
  for(let j=i+1;j<tris.length;j++){
    if(used[j])continue;
    if(tris[i].normal.dot(tris[j].normal)>0.999){bucket.push(tris[j]);used[j]=true}
  }
  // Face center = average of triangle centers; normal = shared normal
  const c=new THREE.Vector3();bucket.forEach(t=>c.add(t.center));c.divideScalar(bucket.length);
  faceCenters.push({pos:c,normal:tris[i].normal.clone()});
}

// Push each marker slightly outward along its face normal so it sits on the surface
const dots=[];
faceCenters.forEach((f,idx)=>{
  const worldPos=f.pos.clone().add(f.normal.clone().multiplyScalar(0.02));
  const el=document.createElement('div');
  el.className='dot';
  el.dataset.idx=idx;
  el.addEventListener('click',e=>{e.stopPropagation();/* placeholder — no names yet */});
  markers.appendChild(el);
  dots.push({el,local:worldPos,normal:f.normal.clone()});
});

// Rotation state with drag + inertia
let rx=-0.25,ry=0.5,vX=0,vY=0.004,drag=false,px=0,py=0;
function pt(e){return e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY}}
canvas.addEventListener('pointerdown',e=>{drag=true;const p=pt(e);px=p.x;py=p.y;canvas.setPointerCapture(e.pointerId)});
canvas.addEventListener('pointermove',e=>{if(!drag)return;const p=pt(e);const dx=p.x-px,dy=p.y-py;ry+=dx*0.008;rx+=dy*0.008;vY=dx*0.0012;vX=dy*0.0012;px=p.x;py=p.y});
canvas.addEventListener('pointerup',()=>{drag=false});
canvas.addEventListener('pointercancel',()=>{drag=false});

function resize(){
  const w=document.documentElement.clientWidth,h=document.documentElement.clientHeight;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  renderer.setSize(w,h,true);
  camera.aspect=w/h;camera.updateProjectionMatrix();
  const radius=1.9;
  const fovRad=camera.fov*Math.PI/180;
  const distH=radius/Math.tan(fovRad/2);
  const distW=radius/Math.tan(fovRad/2)/camera.aspect;
  const dist=Math.max(distH,distW)*1.4;
  camera.position.set(0,0,Math.max(dist,7.2));
  camera.lookAt(0,0,0);
}
window.addEventListener('resize',resize);window.addEventListener('orientationchange',()=>setTimeout(resize,120));window.addEventListener('load',resize);resize();setTimeout(resize,300);

const tmp=new THREE.Vector3();
const camNormal=new THREE.Vector3();
function tick(){
  if(!drag){rx+=vX;ry+=vY;vX*=0.96;vY=vY*0.98+0.00015}
  group.rotation.x=rx;group.rotation.y=ry;
  // 4.5s recursive breath — synced with title + countdown portal shimmer
  const t=performance.now()*0.001;
  const breath=0.5+0.5*Math.sin(t*2*Math.PI/4.5);
  edgeMat.opacity=0.6+breath*0.35;
  glass.emissiveIntensity=0.18+breath*0.32;
  glass.opacity=0.28+breath*0.14;
  // Subtle drift pulse in the air — makes the whole form feel alive
  group.scale.setScalar(1+breath*0.012);
  // Match the flanking o sigils: jet-black interior, bright white edges
  glass.color.setRGB(0,0,0);
  glass.opacity=0.92+breath*0.08;
  glass.transmission=0.1;
  glass.emissive.setRGB(0,0,0);
  glass.emissiveIntensity=0;
  edgeMat.color.setRGB(1,1,1);
  edgeMat.opacity=0.92+breath*0.08;
  renderer.render(scene,camera);

  // Project face-center markers into screen space, hide back-facing
  const w=window.innerWidth,h=window.innerHeight;
  dots.forEach(d=>{
    tmp.copy(d.local).applyEuler(group.rotation);
    // World-space normal for this face
    camNormal.copy(d.normal).applyEuler(group.rotation);
    // Camera looks down -Z from (0,0,6): face is visible when its normal has positive Z component
    const visible=camNormal.z>0.05;
    if(!visible){d.el.style.display='none';return}
    d.el.style.display='block';
    const p=tmp.clone().project(camera);
    const x=(p.x*0.5+0.5)*w;
    const y=(-p.y*0.5+0.5)*h;
    d.el.style.left=x+'px';
    d.el.style.top=y+'px';
    d.el.style.opacity=Math.min(1,0.4+camNormal.z).toFixed(2);
    d.el.style.zIndex=Math.round(camNormal.z*1000)+1000;
  });
  requestAnimationFrame(tick);
}
tick();
</script></body></html>
